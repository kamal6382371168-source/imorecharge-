<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamal Diamond Reseller</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0d2546; --secondary: #1a56db; }
        body { font-family: sans-serif; background: #eef2f7; display: flex; justify-content: center; margin: 0; padding: 10px; }
        .card-box { width: 100%; max-width: 450px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 25px; text-align: center; }
        .content { padding: 20px; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .diamond-item { border: 2px solid #f0f0f0; border-radius: 12px; padding: 15px 5px; text-align: center; cursor: pointer; transition: 0.3s; }
        .diamond-item.active { border-color: var(--secondary); background: #f0f7ff; transform: scale(1.05); }
        .diamond-item i { color: #00d2ff; display: block; margin-bottom: 5px; }
        .summary { background: #f3f6ff; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e1e8f5; }
        .btn-pay { width: 100%; padding: 18px; background: var(--secondary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(26, 86, 219, 0.3); }
        footer { text-align: center; padding: 15px; background: #fff; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card-box">
    <header>
        <h1 style="margin:0; font-size:22px;">Kamal Diamond Reseller</h1>
        <small><i class="fa-solid fa-bolt"></i> 24/7 Fast Delivery</small>
    </header>

    <div class="content">
        <label style="font-weight:bold; display:block; margin-bottom:8px;">IMO Profile ID</label>
        <input type="number" id="profileId" placeholder="Enter ID (e.g. 135379)">

        <label style="font-weight:bold; display:block; margin-bottom:8px;">Select Pack</label>
        <div class="grid">
            <div class="diamond-item" onclick="select(this, 10, 30)"><i class="fa-solid fa-gem"></i>10<br>₹30</div>
            <div class="diamond-item" onclick="select(this, 50, 90)"><i class="fa-solid fa-gem"></i>50<br>₹90</div>
            <div class="diamond-item" onclick="select(this, 100, 172)"><i class="fa-solid fa-gem"></i>100<br>₹172</div>
            <div class="diamond-item" onclick="select(this, 500, 860)"><i class="fa-solid fa-gem"></i>500<br>₹860</div>
            <div class="diamond-item" onclick="select(this, 1000, 1711)"><i class="fa-solid fa-gem"></i>1000<br>₹1711</div>
            <div class="diamond-item" onclick="select(this, 10000, 17000)"><i class="fa-solid fa-gem"></i>10000<br>₹17000</div>
        </div>

        <div class="summary">
            <div style="display:flex; justify-content:space-between"><span>Selected:</span><span id="q" style="font-weight:bold">0 💎</span></div>
            <div style="display:flex; justify-content:space-between; margin-top:10px;"><span>Total Amount:</span><span id="a" style="color:var(--secondary); font-weight:bold; font-size:20px;">₹ 0.00</span></div>
        </div>

        <button class="btn-pay" onclick="pay()">PROCEED TO PAY</button>
    </div>

    <footer>
        <a href="https://wa.me/916382371168" style="color:#25d366; text-decoration:none; font-weight:bold;"><i class="fa-brands fa-whatsapp"></i> WhatsApp Support</a>
    </footer>
</div>

<script>
    let amt = 0; let qty = 0;
    function select(el, q, p) {
        document.querySelectorAll('.diamond-item').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        amt = p; qty = q;
        document.getElementById('q').innerText = q + " 💎";
        document.getElementById('txtAmt').innerText = "₹ " + p.toFixed(2);
    }

    // இதான் மிக முக்கியமான பகுதி (Automatic Link Opener)
    async function pay() {
        const id = document.getElementById('profileId').value;
        if (!id || amt === 0) { alert("Please enter ID and select a pack!"); return; }

        const apiKey = "cc5f8334-7d76-4ec3-9385-5f763948cec8";
        const orderData = {
            key: apiKey,
            client_txn_id: "TXN" + Date.now(),
            amount: amt.toString(),
            p_info: "Diamond_" + qty,
            customer_name: "User_" + id,
            customer_email: "kamal6382371168@gmail.com",
            customer_mobile: "6382371168",
            redirect_url: "https://kamalseller.com/success"
        };

        try {
            const response = await fetch('https://api.ekqr.in/api/create_order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });

            const result = await response.json();
            
            // இப்போது அந்த பிளாக் ஸ்கிரீன் வராமல், நேரடியாக பேமெண்ட் லிங்க் ஓப்பன் ஆகும்
            if (result.status && result.data.payment_url) {
                window.location.href = result.data.payment_url; 
            } else {
                alert("Order failed: " + result.msg);
            }
        } catch (e) {
            alert("Connection error! Please check your internet.");
        }
    }
</script>
</body>
</html>
