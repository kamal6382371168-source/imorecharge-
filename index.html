<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamal Diamond Reseller | Secure Payments</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0a2e5c; --secondary: #1e4eb8; --accent: #00d2ff; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; background: #fff; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden; margin: 15px; border: 1px solid #ddd; }
        header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 35px 20px; text-align: center; }
        header h1 { margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 1.5px; }
        .badge { background: rgba(255, 255, 255, 0.15); padding: 8px 15px; border-radius: 50px; font-size: 12px; display: inline-block; margin-top: 12px; border: 1px solid rgba(255,255,255,0.2); }
        .content { padding: 30px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 700; color: #333; font-size: 15px; }
        .form-group input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 15px; box-sizing: border-box; font-size: 16px; transition: 0.3s; background: #fafafa; }
        .form-group input:focus { border-color: var(--secondary); outline: none; background: #fff; }
        .section-title { font-weight: 800; margin-bottom: 15px; display: block; color: #222; font-size: 16px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
        .card { background: #fff; border: 2px solid #f1f1f1; border-radius: 18px; padding: 18px 5px; text-align: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card i { color: var(--accent); font-size: 24px; margin-bottom: 8px; display: block; }
        .card .amount { font-weight: 800; font-size: 16px; display: block; color: #111; }
        .card .price { color: #777; font-size: 13px; font-weight: 600; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-color: var(--accent); }
        .card.active { border-color: var(--secondary); background-color: #f0f7ff; transform: scale(1.05); box-shadow: 0 10px 25px rgba(30, 78, 184, 0.2); }
        .summary { background: #f8faff; border-radius: 20px; padding: 20px; margin-bottom: 30px; border: 1px solid #e1e8f5; }
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px; color: #444; }
        .total-val { font-size: 22px; color: var(--secondary); font-weight: 900; }
        .btn-pay { width: 100%; padding: 20px; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; border: none; border-radius: 15px; font-size: 19px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px rgba(30, 78, 184, 0.3); transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-pay:active { transform: scale(0.97); }
        footer { text-align: center; padding: 25px; background: #fff; border-top: 1px solid #eee; }
        .support-link { color: #25d366; text-decoration: none; font-weight: 700; font-size: 15px; display: flex; justify-content: center; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Kamal Diamond Reseller</h1>
        <div class="badge"><i class="fa-solid fa-bolt"></i> 24/7 FAST SERVICE</div>
    </header>

    <div class="content">
        <div class="form-group">
            <label><i class="fa-solid fa-id-card"></i> IMO Profile ID</label>
            <input type="number" id="profileId" placeholder="Enter ID Number (e.g. 154356)">
        </div>

        <span class="section-title"><i class="fa-solid fa-gem"></i> Select Credits</span>
        <div class="grid">
            <div class="card" onclick="selectPack(this, 10, 30)"><i class="fa-solid fa-gem"></i><span class="amount">10</span><span class="price">₹30</span></div>
            <div class="card" onclick="selectPack(this, 50, 90)"><i class="fa-solid fa-gem"></i><span class="amount">50</span><span class="price">₹90</span></div>
            <div class="card" onclick="selectPack(this, 100, 172)"><i class="fa-solid fa-gem"></i><span class="amount">100</span><span class="price">₹172</span></div>
            <div class="card" onclick="selectPack(this, 500, 860)"><i class="fa-solid fa-gem"></i><span class="amount">500</span><span class="price">₹860</span></div>
            <div class="card" onclick="selectPack(this, 1000, 1711)"><i class="fa-solid fa-gem"></i><span class="amount">1000</span><span class="price">₹1711</span></div>
            <div class="card" onclick="selectPack(this, 10000, 17000)"><i class="fa-solid fa-gem"></i><span class="amount">10000</span><span class="price">₹17000</span></div>
        </div>

        <div class="summary">
            <div class="row"><span>Selected Credits:</span><span id="finalCredits" style="font-weight: 700;">0 💎</span></div>
            <div class="row"><span>Final Price:</span><span class="total-val" id="finalAmount">₹ 0.00</span></div>
        </div>

        <button class="btn-pay" onclick="initiatePayment()">
            <i class="fa-solid fa-cart-shopping"></i> PAY NOW
        </button>
    </div>

    <footer>
        <a href="https://wa.me/916382371168" class="support-link"><i class="fa-brands fa-whatsapp"></i> WhatsApp Support</a>
    </footer>
</div>

<script>
    let amount = 0;
    let credits = 0;

    function selectPack(el, qty, pr) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        amount = pr;
        credits = qty;
        document.getElementById('finalCredits').innerText = qty + " 💎";
        document.getElementById('finalAmount').innerText = "₹ " + pr.toFixed(2);
    }

    function initiatePayment() {
        const userId = document.getElementById('profileId').value;
        const apiKey = "cc5f8334-7d76-4ec3-9385-5f763948cec8";

        if (!userId) { alert("Please enter your IMO ID!"); return; }
        if (amount === 0) { alert("Please select a pack!"); return; }

        /* முக்கியமானது: இந்த URL உங்கள் UPIGateway-ன் API ஸ்ட்ரக்சர் படி இருக்க வேண்டும்.
           பொதுவாக 'Direct Intent' வேலை செய்ய இந்த பார்மட் உதவும்:
        */
        const paymentUrl = `https://upigateway.com/order/pay?api_key=${apiKey}&amount=${amount}&client_id=${userId}&product_name=Diamond_${credits}`;
        
        window.location.href = paymentUrl;
    }
</script>
</body>
</html>
