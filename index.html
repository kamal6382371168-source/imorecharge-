
<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamal Diamond Reseller - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #1a4a8e;
            --bg-gray: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 100%;
            max-width: 450px;
            background: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
            margin: 15px;
        }

        /* Header Section */
        header {
            background-color: var(--primary-blue);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 { margin: 0; font-size: 22px; }
        .status-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-top: 10px;
        }

        /* Form Content */
        .content { padding: 20px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* Diamond Grid */
        .recharge-label { font-weight: bold; margin-bottom: 15px; display: block; }
        .diamond-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .diamond-card {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .diamond-card:hover { border-color: var(--primary-blue); background: #f0f7ff; }
        .diamond-card.active {
            border: 2px solid var(--primary-blue);
            background: #eef4ff;
        }

        .diamond-card i { color: #00c3ff; margin-bottom: 5px; display: block; }
        .diamond-card .count { font-weight: bold; display: block; font-size: 14px; }
        .diamond-card .price { color: #666; font-size: 12px; }

        /* Calculation Section */
        .summary-box {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px dashed #ccc;
        }

        .summary-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .total-price { font-size: 18px; color: var(--primary-blue); font-weight: bold; }

        /* Action Buttons */
        .btn-proceed {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Footer / Customer Care */
        .footer {
            text-align: center;
            padding: 20px;
            background: #f1f1f1;
            font-size: 13px;
        }

        .footer a { color: #25D366; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1>கமல் டைமண்ட் ரிசெல்லர்</h1>
        <div class="status-badge">
            <i class="fa-solid fa-bolt"></i> 24 ஹவர்ஸ் அவைலபிள் | ஃபாஸ்ட் சர்வீஸ்
        </div>
    </header>

    <div class="content">
        <div class="input-group">
            <label for="imoId">Profile ID Number</label>
            <input type="text" id="imoId" placeholder="Enter your IMO ID here...">
        </div>

        <span class="recharge-label">Select Recharge credit List</span>
        <div class="diamond-grid">
            <div class="diamond-card" onclick="selectPack(this, 10, 30)">
                <i class="fa-solid fa-gem"></i> <span class="count">10</span> <span class="price">₹ 30.00</span>
            </div>
            <div class="diamond-card" onclick="selectPack(this, 50, 90)">
                <i class="fa-solid fa-gem"></i> <span class="count">50</span> <span class="price">₹ 90.00</span>
            </div>
            <div class="diamond-card" onclick="selectPack(this, 100, 172)">
                <i class="fa-solid fa-gem"></i> <span class="count">100</span> <span class="price">₹ 172.00</span>
            </div>
            <div class="diamond-card" onclick="selectPack(this, 200, 344)">
                <i class="fa-solid fa-gem"></i> <span class="count">200</span> <span class="price">₹ 344.00</span>
            </div>
            <div class="diamond-card" onclick="selectPack(this, 500, 860)">
                <i class="fa-solid fa-gem"></i> <span class="count">500</span> <span class="price">₹ 860.00</span>
            </div>
            <div class="diamond-card" onclick="selectPack(this, 1000, 1711)">
                <i class="fa-solid fa-gem"></i> <span class="count">1000</span> <span class="price">₹ 1711.00</span>
            </div>
        </div>

        <div class="summary-box">
            <div class="summary-row">
                <span>Total credits:</span>
                <span id="finalCredits">0 💎</span>
            </div>
            <div class="summary-row">
                <span style="font-weight: bold;">Total Amount:</span>
                <span class="total-price" id="finalAmount">₹ 0.00</span>
            </div>
        </div>

        <button class="btn-proceed" onclick="handlePayment()">Proceed to Pay</button>
    </div>

    <div class="footer">
        <p>Need Help? <a href="https://wa.me/916382371168"><i class="fa-brands fa-whatsapp"></i> WhatsApp Us</a></p>
        <p>Email: kamal6382371168@gmail.com</p>
    </div>
</div>

<script>
    let selectedAmount = 0;

    function selectPack(element, credits, price) {
        // Remove active class from all
        document.querySelectorAll('.diamond-card').forEach(card => card.classList.remove('active'));
        // Add to current
        element.classList.add('active');
        
        selectedAmount = price;
        document.getElementById('finalCredits').innerText = credits + " 💎";
        document.getElementById('finalAmount').innerText = "₹ " + price.toFixed(2);
    }

    function handlePayment() {
        const id = document.getElementById('imoId').value;
        if (!id) {
            alert("தயவுசெய்து உங்கள் IMO ID-ஐ உள்ளிடவும்!");
            return;
        }
        if (selectedAmount === 0) {
            alert("ஒரு டைமண்ட் பேக்கை தேர்ந்தெடுக்கவும்!");
            return;
        }
        
        alert("Payment Gateway-க்கு செல்கிறது... (API Key: cc5f8334-7d76-4ec3-9385-5f763948cec8)");
        // இங்கே உங்கள் UPIGateway லிங்க் வரும்
    }
</script>

</body>
</html>
