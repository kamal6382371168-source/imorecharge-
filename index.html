<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamal Diamond Reseller | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0a2e5c; --secondary: #1e4eb8; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 25px; text-align: center; }
        .content { padding: 20px; }
        .form-group { margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .card { border: 2px solid #f1f1f1; border-radius: 12px; padding: 15px 5px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card.active { border-color: var(--secondary); background: #f0f7ff; transform: scale(1.05); }
        .card i { color: #00d2ff; display: block; margin-bottom: 5px; }
        .summary { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed #ccc; }
        .btn-pay { width: 100%; padding: 18px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        footer { text-align: center; padding: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0">Kamal Diamond Reseller</h2>
        <div style="font-size:12px; margin-top:5px;"><i class="fa-solid fa-bolt"></i> 24/7 FAST RECHARGE</div>
    </header>

    <div class="content">
        <div class="form-group">
            <label style="font-weight:bold; display:block; margin-bottom:5px;">IMO Profile ID</label>
            <input type="number" id="profileId" placeholder="Enter Profile ID Number">
        </div>

        <div class="grid">
            <div class="card" onclick="select(this, 10, 30)"><i class="fa-solid fa-gem"></i>10<br><small>₹30</small></div>
            <div class="card" onclick="select(this, 50, 90)"><i class="fa-solid fa-gem"></i>50<br><small>₹90</small></div>
            <div class="card" onclick="select(this, 100, 172)"><i class="fa-solid fa-gem"></i>100<br><small>₹172</small></div>
            <div class="card" onclick="select(this, 500, 860)"><i class="fa-solid fa-gem"></i>500<br><small>₹860</small></div>
            <div class="card" onclick="select(this, 1000, 1711)"><i class="fa-solid fa-gem"></i>1000<br><small>₹1711</small></div>
            <div class="card" onclick="select(this, 10000, 17000)"><i class="fa-solid fa-gem"></i>10000<br><small>₹17000</small></div>
        </div>

        <div class="summary">
            <div style="display:flex; justify-content:space-between"><span>Selected:</span><span id="txtQty" style="font-weight:bold">0 💎</span></div>
            <div style="display:flex; justify-content:space-between; margin-top:10px;"><span>Total:</span><span id="txtAmt" style="color:var(--secondary); font-weight:bold; font-size:20px;">₹ 0.00</span></div>
        </div>

        <button class="btn-pay" onclick="createOrder()">PROCEED TO PAY</button>
    </div>

    <footer>
        <i class="fa-brands fa-whatsapp"></i> Support: +916382371168
    </footer>
</div>

<script>
    let amt = 0; let qty = 0;
    function select(el, q, p) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        amt = p; qty = q;
        document.getElementById('txtQty').innerText = q + " 💎";
        document.getElementById('txtAmt').innerText = "₹ " + p.toFixed(2);
    }

    async function createOrder() {
        const id = document.getElementById('profileId').value;
        const apiKey = "cc5f8334-7d76-4ec3-9385-5f763948cec8";

        if (!id || amt === 0) { alert("Please enter ID and select pack!"); return; }

        // Merchant Connection ஸ்கிரீன்ஷாட்டில் உள்ளபடி JSON Data
        const orderData = {
            key: apiKey,
            client_txn_id: "TXN" + Date.now(), // Unique ID
            amount: amt.toString(),
            p_info: "Diamond_" + qty,
            customer_name: "Customer_" + id,
            customer_email: "kamal6382371168@gmail.com",
            customer_mobile: "6382371168",
            redirect_url: "https://kamalseller.com/success"
        };

        try {
            const response = await fetch('https://api.ekqr.in/api/create_order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });

            const result = await response.json();
            if (result.status && result.data.payment_url) {
                // இதுதான் ஜிபே/போன்பே ஓப்பன் செய்யும் உண்மையான லிங்க்
                window.location.href = result.data.payment_url;
            } else {
                alert("Error: " + result.msg);
            }
        } catch (error) {
            console.error("Payment Error:", error);
            alert("Payment Gateway connection failed!");
        }
    }
</script>
</body>
</html>
