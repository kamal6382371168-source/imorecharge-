<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamal Diamond Reseller | Contact Us</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #0a0a0a;
            --accent-blue: #00d2ff;
            --whatsapp-green: #25D366;
            --text-main: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-card {
            text-align: center;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            background: #151515;
            border-radius: 30px;
            border: 1px solid #333;
            box-shadow: 0 10px 50px rgba(0, 210, 255, 0.15);
        }

        .logo h1 {
            font-size: 32px;
            color: var(--accent-blue);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-tag {
            display: inline-block;
            background: rgba(255, 0, 0, 0.2);
            color: #ff4d4d;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .message {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 35px;
            color: #ccc;
        }

        .whatsapp-container {
            position: relative;
            display: inline-block;
        }

        .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--whatsapp-green);
            color: white;
            text-decoration: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
        }

        .whatsapp-btn i {
            font-size: 30px;
            margin-right: 15px;
        }

        .whatsapp-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.6);
        }

        .contact-details {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .contact-details p {
            font-size: 14px;
            color: #777;
            margin: 5px 0;
        }

        /* Animation for the button */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .whatsapp-btn {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="logo">
            <h1>Kamal Diamond Reseller</h1>
        </div>
        
        <div class="status-tag">Website Currently Closed</div>

        <div class="message">
            Our automated payment system is temporarily offline. <br>
            <strong>For fast Diamond Top-up, please contact us directly on WhatsApp.</strong>
        </div>

        <div class="whatsapp-container">
            <a href="https://wa.me/916382371168?text=Hi%20Kamal,%20I%20want%20to%20buy%20Diamonds" class="whatsapp-btn">
                <i class="fab fa-whatsapp"></i> CONTACT ON WHATSAPP
            </a>
        </div>

        <div class="contact-details">
            <p><i class="fas fa-headset"></i> 24/7 Fast Customer Service</p>
            <p><i class="fas fa-envelope"></i> kamal6382371168@gmail.com</p>
        </div>
    </div>

</body>
</html>
