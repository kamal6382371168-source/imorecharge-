<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamal Diamond Reseller | Official Store</title>
    <style>
        :root { --accent: #00d2ff; --gold: #ffd700; --bg: #0f0f0f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; text-align: center; }
        .header { padding: 25px 10px; border-bottom: 2px solid var(--accent); margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 26px; color: var(--accent); text-transform: uppercase; }
        .container { max-width: 450px; margin: auto; background: #1a1a1a; padding: 25px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.8); }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .pack { background: #252525; padding: 15px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .pack.active { border-color: var(--gold); background: #333; transform: scale(1.03); }
        .pack b { display: block; color: var(--gold); font-size: 17px; }
        .pay-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .footer { margin-top: 30px; font-size: 13px; color: #555; }
    </style>
</head>
<body>

<div class="header">
    <h1>Kamal Diamond Reseller</h1>
    <p>24/7 Fast Service | English Version</p>
</div>

<div class="container">
    <label>IMO ID Number (Mandatory)</label>
    <input type="text" id="cust_id" placeholder="Enter your IMO ID" autocomplete="off">

    <label>Select Diamond Pack</label>
    <div class="grid">
        <div class="pack" onclick="select(this, 30, '10 Diamonds')"><b>10 Diamonds</b>₹ 30.00</div>
        <div class="pack" onclick="select(this, 90, '50 Diamonds')"><b>50 Diamonds</b>₹ 90.00</div>
        <div class="pack" onclick="select(this, 172, '100 Diamonds')"><b>100 Diamonds</b>₹ 172.00</div>
        <div class="pack" onclick="select(this, 344, '200 Diamonds')"><b>200 Diamonds</b>₹ 344.00</div>
        <div class="pack" onclick="select(this, 860, '500 Diamonds')"><b>500 Diamonds</b>₹ 860.00</div>
        <div class="pack" onclick="select(this, 1711, '1000 Diamonds')"><b>1000 Diamonds</b>₹ 1711.00</div>
        <div class="pack" onclick="select(this, 3422, '2000 Diamonds')"><b>2000 Diamonds</b>₹ 3422.00</div>
        <div class="pack" onclick="select(this, 17000, '10000 Diamonds')"><b>10000 Diamonds</b>₹ 17000.00</div>
    </div>

    <button class="pay-btn" onclick="process()">PAY NOW</button>
</div>

<div class="footer">
    Support: +916382371168 | kamal6382371168@gmail.com
</div>

<script>
    let amt = 0; let pk = "";
    function select(el, a, p) {
        document.querySelectorAll('.pack').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        amt = a; pk = p;
    }

    function process() {
        const id = document.getElementById('cust_id').value;
        if (!id) { alert("Enter IMO ID!"); return; }
        if (amt === 0) { alert("Select a pack!"); return; }

        // 404 எரர் வராமல் இருக்க ஒரு Random Order ID
        const orderId = "KD" + Math.floor(Math.random() * 1000000);
        const apiKey = "cc5f8334-7d76-4ec3-9385-5f763948cec8";
        
        // உங்கள் 11-வது பாயிண்ட்: மெசேஜில் ID மற்றும் பேக் விவரம்
        const note = encodeURIComponent(`ID:${id} Pack:${pk}`);

        // சரியான Gateway URL அமைப்பு
        const finalUrl = `https://upigateway.com/pay?api_key=${apiKey}&order_id=${orderId}&amount=${amt}&name=KamalReseller&note=${note}`;

        window.location.href = finalUrl;
    }
</script>

</body>
</html>
